<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">

  <!-- Sky blue background -->
  <rect width="1024" height="1024" fill="#4A90D9"/>

  <!-- Graph area pushed down to center (offset ~80px down from before) -->
  <g transform="translate(0, 50)">

    <!-- Subtle grid lines -->
    <g opacity="0.1" stroke="#ffffff" stroke-width="1">
      <line x1="170" y1="60" x2="170" y2="680"/>
      <line x1="340" y1="60" x2="340" y2="680"/>
      <line x1="512" y1="60" x2="512" y2="680"/>
      <line x1="682" y1="60" x2="682" y2="680"/>
      <line x1="852" y1="60" x2="852" y2="680"/>
      <line x1="80" y1="180" x2="944" y2="180"/>
      <line x1="80" y1="370" x2="944" y2="370"/>
      <line x1="80" y1="560" x2="944" y2="560"/>
    </g>

    <!-- Top left: Area chart -->
    <g>
      <path d="M80,300 L180,258 L280,276 L370,196 L460,218 L500,148 L500,348 L80,348 Z" fill="#ffffff" opacity="0.15"/>
      <polyline points="80,300 180,258 280,276 370,196 460,218 500,148" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
      <circle cx="80" cy="300" r="7" fill="#ffffff" opacity="0.7"/>
      <circle cx="180" cy="258" r="7" fill="#ffffff" opacity="0.7"/>
      <circle cx="280" cy="276" r="7" fill="#ffffff" opacity="0.7"/>
      <circle cx="370" cy="196" r="7" fill="#ffffff" opacity="0.8"/>
      <circle cx="460" cy="218" r="7" fill="#ffffff" opacity="0.8"/>
      <circle cx="500" cy="148" r="8" fill="#ffffff"/>
    </g>

    <!-- Top right: Bar chart -->
    <g>
      <rect x="548" y="272" width="50" height="76" rx="5" fill="#ffffff" opacity="0.25"/>
      <rect x="614" y="230" width="50" height="118" rx="5" fill="#ffffff" opacity="0.35"/>
      <rect x="680" y="184" width="50" height="164" rx="5" fill="#ffffff" opacity="0.45"/>
      <rect x="746" y="138" width="50" height="210" rx="5" fill="#ffffff" opacity="0.6"/>
      <rect x="812" y="96" width="50" height="252" rx="5" fill="#ffffff" opacity="0.75"/>
      <rect x="878" y="58" width="50" height="290" rx="5" fill="#ffffff" opacity="0.9"/>
    </g>

    <!-- Middle separator -->
    <line x1="80" y1="378" x2="944" y2="378" stroke="#ffffff" stroke-width="1.5" opacity="0.15"/>

    <!-- Bottom left: Candlestick chart -->
    <g>
      <line x1="140" y1="415" x2="140" y2="555" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
      <rect x="125" y="442" width="30" height="42" rx="3" fill="#ffffff" opacity="0.5"/>

      <line x1="220" y1="406" x2="220" y2="565" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
      <rect x="205" y="424" width="30" height="47" rx="3" fill="#ffffff" opacity="0.3"/>

      <line x1="300" y1="396" x2="300" y2="548" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
      <rect x="285" y="410" width="30" height="56" rx="3" fill="#ffffff" opacity="0.7"/>

      <line x1="380" y1="390" x2="380" y2="542" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
      <rect x="365" y="404" width="30" height="42" rx="3" fill="#ffffff" opacity="0.5"/>

      <line x1="460" y1="382" x2="460" y2="530" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
      <rect x="445" y="394" width="30" height="48" rx="3" fill="#ffffff" opacity="0.8"/>
    </g>

    <!-- Bottom right: Donut chart -->
    <g transform="translate(712, 480)">
      <circle cx="0" cy="0" r="82" fill="none" stroke="#ffffff" stroke-width="28" opacity="0.15"/>
      <circle cx="0" cy="0" r="82" fill="none" stroke="#ffffff" stroke-width="28" opacity="0.9"
              stroke-dasharray="155 361" stroke-dashoffset="0" transform="rotate(-90)"/>
      <circle cx="0" cy="0" r="82" fill="none" stroke="#ffffff" stroke-width="28" opacity="0.55"
              stroke-dasharray="105 411" stroke-dashoffset="-155" transform="rotate(-90)"/>
      <circle cx="0" cy="0" r="82" fill="none" stroke="#ffffff" stroke-width="28" opacity="0.3"
              stroke-dasharray="68 448" stroke-dashoffset="-260" transform="rotate(-90)"/>
      <circle cx="0" cy="0" r="14" fill="#4A90D9"/>
    </g>

    <!-- Accent dots top-right -->
    <circle cx="880" cy="80" r="7" fill="#ffffff" opacity="0.3"/>
    <circle cx="908" cy="80" r="7" fill="#ffffff" opacity="0.5"/>
    <circle cx="936" cy="80" r="7" fill="#ffffff" opacity="0.7"/>

  </g>

  <!-- "Index" text — bottom-center -->
  <text x="512" y="960" text-anchor="middle"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="182" font-weight="700" fill="#ffffff" letter-spacing="-2">Index</text>

</svg>
