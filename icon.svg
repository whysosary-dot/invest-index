<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">

  <!-- Sky blue background with rounded corners -->
  <rect width="1024" height="1024" rx="220" fill="#4A90D9"/>

  <!-- Subtle grid lines -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="1.5">
    <line x1="160" y1="180" x2="160" y2="680"/>
    <line x1="330" y1="180" x2="330" y2="680"/>
    <line x1="500" y1="180" x2="500" y2="680"/>
    <line x1="670" y1="180" x2="670" y2="680"/>
    <line x1="840" y1="180" x2="840" y2="680"/>
    <line x1="160" y1="280" x2="840" y2="280"/>
    <line x1="160" y1="430" x2="840" y2="430"/>
    <line x1="160" y1="580" x2="840" y2="580"/>
  </g>

  <!-- Area fill under the line chart -->
  <path d="M160,560 L280,500 L400,530 L500,390 L620,430 L720,300 L840,220 L840,680 L160,680 Z"
        fill="url(#areaGrad)" opacity="0.35"/>

  <defs>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Line chart (꺽은선 그래프) -->
  <polyline
    points="160,560 280,500 400,530 500,390 620,430 720,300 840,220"
    fill="none" stroke="#ffffff" stroke-width="10"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data point dots -->
  <circle cx="160" cy="560" r="12" fill="#ffffff" opacity="0.5"/>
  <circle cx="280" cy="500" r="12" fill="#ffffff" opacity="0.55"/>
  <circle cx="400" cy="530" r="12" fill="#ffffff" opacity="0.6"/>
  <circle cx="500" cy="390" r="13" fill="#ffffff" opacity="0.7"/>
  <circle cx="620" cy="430" r="13" fill="#ffffff" opacity="0.75"/>
  <circle cx="720" cy="300" r="14" fill="#ffffff" opacity="0.85"/>
  <!-- Last point: highlighted -->
  <circle cx="840" cy="220" r="18" fill="#ffffff" opacity="0.25"/>
  <circle cx="840" cy="220" r="11" fill="#ffffff"/>

  <!-- "Index" text -->
  <text x="512" y="850"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="160" font-weight="700" letter-spacing="8"
        fill="#ffffff" text-anchor="middle" opacity="0.95">Index</text>

</svg>
