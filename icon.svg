<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">

  <!-- Sky blue background -->
  <rect width="1024" height="1024" fill="#4A90D9"/>

  <!-- Subtle grid lines -->
  <g opacity="0.1" stroke="#ffffff" stroke-width="1">
    <line x1="170" y1="60" x2="170" y2="720"/>
    <line x1="340" y1="60" x2="340" y2="720"/>
    <line x1="512" y1="60" x2="512" y2="720"/>
    <line x1="682" y1="60" x2="682" y2="720"/>
    <line x1="852" y1="60" x2="852" y2="720"/>
    <line x1="80" y1="200" x2="944" y2="200"/>
    <line x1="80" y1="390" x2="944" y2="390"/>
    <line x1="80" y1="580" x2="944" y2="580"/>
  </g>

  <!-- Top left: Area chart -->
  <g>
    <path d="M80,320 L180,275 L280,295 L370,210 L460,235 L500,160 L500,370 L80,370 Z" fill="#ffffff" opacity="0.15"/>
    <polyline points="80,320 180,275 280,295 370,210 460,235 500,160" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <circle cx="80" cy="320" r="7" fill="#ffffff" opacity="0.7"/>
    <circle cx="180" cy="275" r="7" fill="#ffffff" opacity="0.7"/>
    <circle cx="280" cy="295" r="7" fill="#ffffff" opacity="0.7"/>
    <circle cx="370" cy="210" r="7" fill="#ffffff" opacity="0.8"/>
    <circle cx="460" cy="235" r="7" fill="#ffffff" opacity="0.8"/>
    <circle cx="500" cy="160" r="8" fill="#ffffff"/>
  </g>

  <!-- Top right: Bar chart -->
  <g>
    <rect x="548" y="290" width="50" height="80" rx="5" fill="#ffffff" opacity="0.25"/>
    <rect x="614" y="245" width="50" height="125" rx="5" fill="#ffffff" opacity="0.35"/>
    <rect x="680" y="195" width="50" height="175" rx="5" fill="#ffffff" opacity="0.45"/>
    <rect x="746" y="145" width="50" height="225" rx="5" fill="#ffffff" opacity="0.6"/>
    <rect x="812" y="100" width="50" height="270" rx="5" fill="#ffffff" opacity="0.75"/>
    <rect x="878" y="60" width="50" height="310" rx="5" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- Middle separator -->
  <line x1="80" y1="400" x2="944" y2="400" stroke="#ffffff" stroke-width="1.5" opacity="0.15"/>

  <!-- Bottom left: Candlestick chart -->
  <g>
    <line x1="140" y1="440" x2="140" y2="590" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
    <rect x="125" y="470" width="30" height="45" rx="3" fill="#ffffff" opacity="0.5"/>

    <line x1="220" y1="430" x2="220" y2="600" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
    <rect x="205" y="450" width="30" height="50" rx="3" fill="#ffffff" opacity="0.3"/>

    <line x1="300" y1="420" x2="300" y2="580" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
    <rect x="285" y="435" width="30" height="60" rx="3" fill="#ffffff" opacity="0.7"/>

    <line x1="380" y1="415" x2="380" y2="575" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
    <rect x="365" y="430" width="30" height="45" rx="3" fill="#ffffff" opacity="0.5"/>

    <line x1="460" y1="405" x2="460" y2="560" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
    <rect x="445" y="418" width="30" height="52" rx="3" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- Bottom right: Donut chart -->
  <g transform="translate(712, 510)">
    <circle cx="0" cy="0" r="90" fill="none" stroke="#ffffff" stroke-width="30" opacity="0.15"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#ffffff" stroke-width="30" opacity="0.9"
            stroke-dasharray="170 396" stroke-dashoffset="0" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#ffffff" stroke-width="30" opacity="0.55"
            stroke-dasharray="115 451" stroke-dashoffset="-170" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#ffffff" stroke-width="30" opacity="0.3"
            stroke-dasharray="75 491" stroke-dashoffset="-285" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="16" fill="#4A90D9"/>
  </g>

  <!-- Accent dots top-right -->
  <circle cx="880" cy="80" r="7" fill="#ffffff" opacity="0.3"/>
  <circle cx="908" cy="80" r="7" fill="#ffffff" opacity="0.5"/>
  <circle cx="936" cy="80" r="7" fill="#ffffff" opacity="0.7"/>

  <!-- "Index" text — 32px at 180, white, bottom-center -->
  <text x="512" y="960" text-anchor="middle"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="182" font-weight="700" fill="#ffffff" letter-spacing="-2">Index</text>

</svg>
